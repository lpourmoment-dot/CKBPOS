name: Build & Verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Pre-build verification
        run: node scripts/verify-build.js
        shell: cmd

      - name: Build React app
        run: npm run react-build

      - name: Build Electron installer
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-build verification (ASAR)
        run: node scripts/verify-build.js --post-build
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CKBPOS-Setup-${{ github.sha }}
          path: dist/*.exe
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Full pre-build verification
        run: node scripts/verify-build.js
        shell: cmd

      - name: Build React app
        run: npm run react-build

      - name: Build and publish to GitHub Releases
        run: npm run publish-update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-publish verification (ASAR)
        run: node scripts/verify-build.js --post-build
        shell: cmd
